services:
  - type: web
    name: HELLIOS
    runtime: docker
    dockerfilePath: lib/Dockerfile
    envVars:
      - key: SESSION_ID
        value: ""
      - key: OWNER_NUMBER
        value: "62895335738913"
      - key: BOT_NAME
        value: "HELLIOS"
      - key: COMMAND_MODE
        value: "public"
      - key: TIMEZONE
        value: "Asia/Jakarta"
      - key: MONGO_URL
        value: ""
      - key: POSTGRES_URL
        value: ""
      - key: MYSQL_URL
        value: ""
      - key: DB_URL
        value: ""
    startCommand: npm run start:optimized
